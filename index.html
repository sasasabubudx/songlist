<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莎莎的歌單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 🌌 讓背景變成獨立圖層，並強制固定在最底層不隨頁面滾動 */
        .parallax-bg {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translate3d(0, 0, 0);
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); /* 讓晃動有絲滑的緩衝感 */
            will-change: transform;
            /* 📱 針對 iOS Safari 優化，防止晃動時畫面閃爍 */
            -webkit-transform: translate3d(0, 0, 0);
        }
    </style>
</head>

<body class="min-h-screen p-5 md:p-10 font-sans">

    <div id="parallaxBg" class="parallax-bg"></div>

    <div class="max-w-4xl mx-auto text-center mb-8 bg-white/40 backdrop-blur-sm py-6 px-4 rounded-xl shadow-sm">
        <h1 class="text-3xl font-bold text-sky-600 mb-2">🌌 莎莎的歌單 🌌</h1>
        <div class="text-gray-700 italic text-sm space-y-1 my-3 py-2 rounded-lg max-w-md mx-auto">
            <p>「 喜歡你的心情是七分甜 」</p>
        </div>
        
        <p class="text-gray-600 text-xs mt-3 mb-1 font-medium">不知道要點什麼嗎，可以點進隨機點歌系統</p>
        
        <div class="flex justify-center mt-2">
            <a href="random.html" id="randomBtn" onclick="handleRandomClick(event)" class="inline-flex items-center gap-2 bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-600 hover:to-indigo-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-md transition-all transform hover:scale-105">
                🌠 隨機點歌系統
            </a>
        </div>
    </div>

    <div id="mainContent" class="max-w-4xl mx-auto bg-white/70 backdrop-blur-[2px] rounded-2xl shadow-xl p-6 transition-all duration-300">
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="searchInput" placeholder="輸入歌名或歌手進行搜尋..." class="flex-1 border-2 border-sky-200 bg-white/80 rounded-lg px-4 py-2 focus:outline-none focus:border-sky-500 text-gray-700">
            <select id="sortSelect" class="border-2 border-sky-200 bg-white/80 rounded-lg px-4 py-2 text-gray-700 focus:outline-none focus:border-sky-500">
                <option value="default">預設排序</option>
                <option value="title">依歌名排序</option>
                <option value="artist">依歌手排序</option>
            </select>
        </div>

        <div class="mb-6 bg-sky-50/70 p-4 rounded-xl border border-sky-100 space-y-4">
            <div class="flex justify-between items-center border-b border-sky-100 pb-2">
                <span class="text-sm font-bold text-sky-800">按標籤篩選（可跨列多選）：</span>
                <button onclick="clearSelectedTags()" class="text-xs text-sky-600 hover:text-sky-800 hover:underline">🔄 重設所有標籤</button>
            </div>
            
            <div class="flex flex-col sm:flex-row sm:items-center gap-2">
                <span class="text-xs font-semibold text-gray-500 sm:w-16">🌟 </span>
                <div id="langTagContainer" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="flex flex-col sm:flex-row sm:items-center gap-2">
                <span class="text-xs font-semibold text-gray-500 sm:w-16">🍬 </span>
                <div id="sugarTagContainer" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div class="text-sm text-gray-500 mb-4">
            目前符合條件：<span id="songCount" class="font-bold text-sky-600">0</span> 首歌曲
        </div>

        <div class="overflow-x-auto rounded-lg border border-gray-200 bg-white/60">
            <table class="min-w-full divide-y divide-gray-200 text-left text-sm text-gray-700">
                <thead class="bg-sky-100/80">
                    <tr>
                        <th class="px-4 py-3 font-semibold text-sky-700 w-20">編號</th>
                        <th class="px-4 py-3 font-semibold text-sky-700">歌名</th>
                        <th class="px-4 py-3 font-semibold text-sky-700">歌手</th>
                        <th class="px-4 py-3 font-semibold text-sky-700">標籤</th>
                        <th class="px-4 py-3 font-semibold text-sky-700">備註</th>
                    </tr>
                </thead>
                <tbody id="songTableBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-4 py-8 text-center text-gray-400">正在秒速讀取最新歌單中... 🕒</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let songData = [];
        let activeSelectedTags = []; 

        const langOrder = ["中文", "日文", "台語", "合唱"];
        const sugarOrder = ["無糖", "三分糖", "半糖", "七分糖", "全糖"];

        const songTableBody = document.getElementById("songTableBody");
        const searchInput = document.getElementById("searchInput");
        const sortSelect = document.getElementById("sortSelect");
        const langTagContainer = document.getElementById("langTagContainer");
        const sugarTagContainer = document.getElementById("sugarTagContainer");
        const songCount = document.getElementById("songCount");
        const parallaxBg = document.getElementById("parallaxBg");

        function formatNumber(num) { return `#${String(num).padStart(3, '0')}`; }

        async function loadSongData() {
            try {
                const response = await fetch('song-data.json');
                if (!response.ok) throw new Error('找不到 song-data.json 檔案');
                songData = await response.json();
                
                renderAllTagGroups();
                renderTable();
                initParallax(); // 🚀 初始化視差
            } catch (error) {
                console.error(error);
                songTableBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-red-500">⚠️ 讀取歌單失敗！請確認 song-data.json 是否存在。</td></tr>`;
            }
        }

        function renderAllTagGroups() {
            langTagContainer.innerHTML = langOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="px-3 py-1.5 text-xs rounded-full border transition-all duration-200 font-medium ${isSelected ? 'bg-sky-500 border-sky-400 text-white font-bold shadow-sm' : 'bg-white border-sky-200 text-sky-700 hover:bg-sky-50'}">${isSelected ? '✓ ' : ''}${tag}</button>`;
            }).join('');

            sugarTagContainer.innerHTML = sugarOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="px-3 py-1.5 text-xs rounded-full border transition-all duration-200 font-medium ${isSelected ? 'bg-rose-400 border-rose-300 text-white font-bold shadow-sm' : 'bg-white border-rose-100 text-rose-700 hover:bg-rose-50/50'}">${isSelected ? '✓ ' : ''}${tag}</button>`;
            }).join('');
        }

        function toggleTagFilter(tag) {
            if (activeSelectedTags.includes(tag)) {
                activeSelectedTags = activeSelectedTags.filter(t => t !== tag);
            } else {
                activeSelectedTags.push(tag);
            }
            renderAllTagGroups();
            renderTable();
        }

        function clearSelectedTags() {
            activeSelectedTags = [];
            renderAllTagGroups();
            renderTable();
        }

        function renderTable() {
            const searchText = searchInput.value.toLowerCase();
            const sortBy = sortSelect.value;
            
            let displayList = songData.map((song, index) => ({ ...song, displayCode: formatNumber(index + 1) }));

            displayList = displayList.filter(song => {
                const matchesSearch = song.title.toLowerCase().includes(searchText) || song.artist.toLowerCase().includes(searchText) || song.displayCode.includes(searchText);
                let matchesTags = true;
                if (activeSelectedTags.length > 0) {
                    matchesTags = activeSelectedTags.every(neededTag => song.tags && song.tags.includes(neededTag));
                }
                return matchesSearch && matchesTags;
            });

            if (sortBy === "title") displayList.sort((a, b) => a.title.localeCompare(b.title, "zh-TW"));
            else if (sortBy === "artist") displayList.sort((a, b) => a.artist.localeCompare(b.artist, "zh-TW"));

            songCount.innerText = displayList.length;
            if (displayList.length === 0) {
                songTableBody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">找不到符合條件的歌曲 😭</td></tr>`;
                return;
            }

            songTableBody.innerHTML = displayList.map(song => `
                <tr class="hover:bg-sky-50/50 transition-colors">
                    <td class="px-4 py-3 font-mono text-sky-600 font-bold">${song.displayCode}</td>
                    <td class="px-4 py-3 font-medium text-gray-900">${song.title}</td>
                    <td class="px-4 py-3 text-gray-600">${song.artist}</td>
                    <td class="px-4 py-3">
                        ${song.tags ? song.tags.map(t => {
                            const isSugar = sugarOrder.includes(t);
                            return `<span class="inline-block text-xs px-2 py-0.5 rounded mr-1 ${isSugar ? 'bg-rose-100 text-rose-700' : 'bg-sky-100 text-sky-700'}">${t}</span>`;
                        }).join('') : ''}
                    </td>
                    <td class="px-4 py-3 text-xs text-gray-500">${song.note || '-'}</td>
                </tr>
            `).join('');
        }
    
        // 👁️ 3D 視差主核心
        function initParallax() {
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            if (!isTouchDevice) {
                // 💻 電腦版：偵測滑鼠微幅晃動
                window.addEventListener('mousemove', (e) => {
                    const moveX = (e.clientX - window.innerWidth / 2) / window.innerWidth * 30;
                    const moveY = (e.clientY - window.innerHeight / 2) / window.innerHeight * 30;
                    parallaxBg.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
                });
            } else {
                // 📱 手機版：如果是已經拿過權限的狀態就自動監聽（適用 Android 或重複造訪的 iOS）
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission !== 'function') {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
        }

        // 陀螺儀數據處理邏輯
        function handleOrientation(e) {
            if (e.gamma !== null && e.beta !== null) {
                const moveX = (e.gamma) * 0.8; 
                const moveY = (e.beta - 45) * 0.8; 
                parallaxBg.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
            }
        }

        // 🔒 ✨ 按下「隨機點歌系統」按鈕時的複合處理邏輯
        function handleRandomClick(event) {
            const targetUrl = event.currentTarget.getAttribute('href');
            
            // 判斷是否為需要授權的 iPhone (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // 暫停原本的網頁跳轉行為，先跟 iPhone 討權限
                event.preventDefault();
                
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        // 不管使用者是點「允許」還是「拒絕」，下一步都要順利帶他去隨機點歌頁面
                        if (response === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                        // 轉場到下一頁
                        window.location.href = targetUrl;
                    })
                    .catch(error => {
                        console.error(error);
                        window.location.href = targetUrl;
                    });
            }
            // 如果不是 iPhone，就會直接正常的跳轉到 random.html，一切順暢！
        }

        searchInput.addEventListener("input", renderTable);
        sortSelect.addEventListener("change", renderTable);

        loadSongData();
    </script>
</body>
</html>
