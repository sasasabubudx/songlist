<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莎莎的珍奶抽歌機 🎲</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen p-5 md:p-10 font-sans bg-[#F3E9DC] text-[#4A3728] bg-no-repeat bg-cover bg-center bg-fixed"
      

    <div class="max-w-md mx-auto mb-6 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 bg-[#8C7863] hover:bg-[#73604E] text-white text-xs font-bold px-4 py-2 rounded-full shadow-md transition-all">
            ⬅️ 返回 莎莎的歌單 
        </a>
    </div>

    <div class="max-w-md mx-auto bg-[#FFFDF9]/90 backdrop-blur-sm rounded-3xl shadow-xl border-4 border-[#8C7863] p-6 text-center">
        <h1 class="text-3xl font-bold text-[#5C4033] mb-1">🧋客製化專屬特調！</h1>
        <p class="text-xs text-[#8C7863] mb-4"></p>

        <div class="bg-[#FDF8F2] border-2 border-[#E6D5C3] rounded-2xl p-4 text-left mb-6 space-y-4">
            <div>
                <span class="text-xs font-bold text-[#73604E] block mb-2">⭐ </span>
                <div id="langTagContainer" class="flex flex-wrap gap-2"></div>
            </div>
            <div>
                <span class="text-xs font-bold text-[#73604E] block mb-2">🍬 </span>
                <div id="sugarTagContainer" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <button onclick="drawSong()" id="drawBtn" class="w-full bg-[#362517] hover:bg-[#21150B] text-[#FFFDF9] font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 text-lg">
            🧋🧋🧋
        </button>

        <div id="loadingStatus" class="hidden my-8 text-[#8C7863] font-bold text-sm animate-bounce">
            🧋 正在努力幫妳搖珍奶中... 🥤
        </div>

        <div id="resultCard" class="hidden mt-6 bg-gradient-to-br from-[#FAF0E6] to-[#FFF8DC] border-2 border-[#CD853F] rounded-2xl p-6 shadow-inner transition-all duration-500">
            <span class="inline-block bg-[#D2B48C] text-[#5C4033] text-xs font-mono font-bold px-3 py-1 rounded-full mb-3" id="resCode">#000</span>
            <h2 class="text-2xl font-bold text-[#362517] mb-1" id="resTitle">歌曲名稱</h2>
            <p class="text-base text-[#73604E] mb-3" id="resArtist">歌手姓名</p>
            <div id="resTags" class="flex justify-center flex-wrap gap-1 mb-3"></div>
            <p class="text-xs text-[#A08870] italic border-t border-[#E6D5C3] pt-3" id="resNote">-</p>
        </div>
    </div>

    <script>
        let songData = [];
        let activeSelectedTags = [];

        const langOrder = ["中文", "日文", "台語", "合唱"];
        const sugarOrder = ["無糖", "三分糖", "半糖", "七分糖", "全糖"];

        const langTagContainer = document.getElementById("langTagContainer");
        const sugarTagContainer = document.getElementById("sugarTagContainer");
        const resultCard = document.getElementById("resultCard");
        const loadingStatus = document.getElementById("loadingStatus");

        function formatNumber(num) { return `#${String(num).padStart(3, '0')}`; }

        // 🚀 從同目錄下的 song-data.json 秒讀取
        async function loadSongData() {
            try {
                const response = await fetch('song-data.json');
                songData = await response.json();
                renderTagButtons();
            } catch (error) {
                console.error("讀取失敗:", error);
            }
        }

        function renderTagButtons() {
            langTagContainer.innerHTML = langOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="w-12 h-12 text-[11px] rounded-full flex items-center justify-center border-2 shadow-sm transition-all duration-200 font-bold leading-tight ${isSelected ? 'bg-[#362517] border-[#21150B] text-[#FFFDF9] scale-110 ring-2 ring-[#8C7863]' : 'bg-[#E6D5C3] border-[#C4B29E] text-[#5C4033] hover:bg-[#DBCA9E]' }">${tag}</button>`;
            }).join('');

            sugarTagContainer.innerHTML = sugarOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="w-12 h-12 text-[11px] rounded-full flex items-center justify-center border-2 shadow-sm transition-all duration-200 font-bold leading-tight ${isSelected ? 'bg-[#5C4033] border-[#362517] text-[#FFFDF9] scale-110 ring-2 ring-[#CD853F]' : 'bg-[#F5E1D3] border-[#E2C6B1] text-[#73604E] hover:bg-[#EED5C5]' }">${tag}</button>`;
            }).join('');
        }

        function toggleTagFilter(tag) {
            if (activeSelectedTags.includes(tag)) {
                activeSelectedTags = activeSelectedTags.filter(t => t !== tag);
            } else {
                activeSelectedTags.push(tag);
            }
            renderTagButtons();
        }

        function drawSong() {
            resultCard.classList.add("hidden");
            
            let filteredList = songData.filter(song => {
                if (activeSelectedTags.length === 0) return true;
                return activeSelectedTags.every(neededTag => song.tags && song.tags.includes(neededTag));
            });

            if (filteredList.length === 0) {
                alert("😭 糟糕！這款配方的珍奶目前沒有符合的歌曲，改一下標籤試試看吧！");
                return;
            }

            const drawBtn = document.getElementById("drawBtn");
            drawBtn.disabled = true;
            loadingStatus.classList.remove("hidden");

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * filteredList.length);
                const luckySong = filteredList[randomIndex];
                
                const originalIndex = songData.findIndex(s => s.title === luckySong.title && s.artist === luckySong.artist);

                document.getElementById("resCode").innerText = luckySong.code ? formatNumber(luckySong.code) : formatNumber(originalIndex + 1);
                document.getElementById("resTitle").innerText = luckySong.title;
                document.getElementById("resArtist").innerText = luckySong.artist;
                document.getElementById("resNote").innerText = luckySong.note ? `💡 備註：${luckySong.note}` : `隨機特調，祝聽歌愉快 🖤`;
                
                document.getElementById("resTags").innerHTML = luckySong.tags ? luckySong.tags.map(t => {
                    const isSugar = sugarOrder.includes(t);
                    return `<span class="text-[10px] px-2 py-0.5 rounded-full ${isSugar ? 'bg-[#F5E1D3] text-[#73604E]' : 'bg-[#E6D5C3] text-[#5C4033]'} font-bold border border-black/5">${t}</span>`;
                }).join('') : '';

                loadingStatus.classList.add("hidden");
                resultCard.classList.remove("hidden");
                drawBtn.disabled = false;
            }, 1000); 
        }

        loadSongData();
    </script>
</body>
</html>
