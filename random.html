<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍奶抽歌機 🎲</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen p-5 md:p-10 font-sans bg-[#F3E9DC] text-[#4A3728]">

    <div class="max-w-md mx-auto mb-6 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 bg-[#8C7863] hover:bg-[#73604E] text-white text-xs font-bold px-4 py-2 rounded-full shadow-md transition-all">
            ⬅️ 返回 莎莎的歌單 
        </a>
    </div>

    <div class="max-w-md mx-auto bg-[#FFFDF9]/90 backdrop-blur-sm rounded-3xl shadow-xl border-4 border-[#8C7863] p-6 text-center">
        <h1 class="text-3xl font-bold text-[#5C4033] mb-1">🧋 客製化專屬特調！</h1>
        <p class="text-xs text-[#8C7863] mb-4">客製化配方，搖出今天的命定歌單</p>

        <div class="bg-[#FDF8F2] border-2 border-[#E6D5C3] rounded-2xl p-4 mb-6 space-y-4">
            <div class="flex items-center gap-3">
                <span class="text-base font-bold shrink-0">⭐</span>
                <div id="langTagContainer" class="flex flex-wrap justify-center gap-3 flex-1"></div>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-base font-bold shrink-0">🍬</span>
                <div id="sugarTagContainer" class="flex flex-wrap justify-center gap-3 flex-1"></div>
            </div>
        </div>

        <div class="mb-6 flex items-center justify-center gap-3 bg-[#FDF8F2] border-2 border-[#E6D5C3] rounded-2xl p-3">
            <label for="countSelect" class="text-xs font-bold text-[#73604E]">🛍️ 我想一次點：</label>
            <!-- 💡 新增 change 事件，讓按鈕文字隨杯數跟著變可愛 -->
            <select id="countSelect" onchange="updateBtnText()" class="bg-white border border-[#8C7863] text-[#5C4033] rounded-lg px-3 py-1 text-sm font-bold focus:outline-none ring-1 ring-[#8C7863]/30">
                <option value="1">1 杯特調 (抽 1 首)</option>
                <option value="2">2 杯特調 (抽 2 首)</option>
                <option value="3">3 杯特調 (抽 3 首)</option>
                <option value="4">4 杯特調 (抽 4 首)</option>
                <option value="5">5 杯特調 (抽 5 首)</option>
            </select>
        </div>

        <button onclick="drawSong()" id="drawBtn" class="w-full bg-[#362517] hover:bg-[#21150B] text-[#FFFDF9] font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2 text-base tracking-wide">
            🧋 🧋 🧋
        </button>

        <div id="loadingStatus" class="hidden my-8 text-[#8C7863] font-bold text-sm animate-bounce">
            🧋 正在努力搖珍奶中... 🧋
        </div>

        <div id="resultsContainer" class="mt-6 space-y-4"></div>
    </div>

    <script>
        let songData = [];
        let activeSelectedTags = [];

        const langOrder = ["中文", "日文", "台語", "合唱"];
        const sugarOrder = ["無糖", "三分糖", "半糖", "七分糖", "全糖"];

        // 📝 莎莎的珍奶抽歌機隨機金句庫（共 11 句）
        const quotes = [
            "精心特調，祝有美好的一天 💞",
            "我有一個超能力，是超喜歡你",
            "人生無常，大腸包小腸",
            "吃飽了，才有力氣減肥",
            "休息是為了不想走路",
            "我不是肚子餓，只是嘴巴寂寞",
            "天涯何處無芳草，回眸一笑閃到腰",
            "薏仁做事薏仁湯，小叮做事小叮噹",
            "那些朝我潑冷水的人，謝謝你們，我省得回家洗頭。",
            "別害怕別人怎麼看你，因為沒有人在看你。",
            "倒了就別急著爬起來，躺著還比較舒服。"
        ];

        const langTagContainer = document.getElementById("langTagContainer");
        const sugarTagContainer = document.getElementById("sugarTagContainer");
        const resultsContainer = document.getElementById("resultsContainer");
        const loadingStatus = document.getElementById("loadingStatus");
        const countSelect = document.getElementById("countSelect");
        const drawBtn = document.getElementById("drawBtn");

        function formatNumber(num) { return `#${String(num).padStart(3, '0')}`; }

        // 動態更新按鈕文字的裝飾
        function updateBtnText() {
            const count = countSelect.value;
            const boba = "🧋".repeat(Math.min(count, 3));
            drawBtn.innerHTML = `${boba} 搖出 ${count} 杯特調歌單！`;
        }

        async function loadSongData() {
            try {
                const response = await fetch('song-data.json');
                songData = await response.json();
                renderTagButtons();
                updateBtnText(); // 初始化按鈕文字
            } catch (error) {
                console.error("讀取失敗:", error);
            }
        }

        function renderTagButtons() {
            langTagContainer.innerHTML = langOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="w-12 h-12 text-[11px] rounded-full flex items-center justify-center border-2 shadow-sm transition-all duration-200 font-bold leading-tight ${isSelected ? 'bg-[#362517] border-[#21150B] text-[#FFFDF9] scale-110 ring-2 ring-[#8C7863]' : 'bg-[#E6D5C3] border-[#C4B29E] text-[#5C4033] hover:bg-[#DBCA9E]' }">${tag}</button>`;
            }).join('');

            sugarTagContainer.innerHTML = sugarOrder.map(tag => {
                const isSelected = activeSelectedTags.includes(tag);
                return `<button onclick="toggleTagFilter('${tag}')" class="w-12 h-12 text-[11px] rounded-full flex items-center justify-center border-2 shadow-sm transition-all duration-200 font-bold leading-tight ${isSelected ? 'bg-[#5C4033] border-[#362517] text-[#FFFDF9] scale-110 ring-2 ring-[#CD853F]' : 'bg-[#F5E1D3] border-[#E2C6B1] text-[#73604E] hover:bg-[#EED5C5]' }">${tag}</button>`;
            }).join('');
        }

        function toggleTagFilter(tag) {
            if (activeSelectedTags.includes(tag)) {
                activeSelectedTags = activeSelectedTags.filter(t => t !== tag);
            } else {
                activeSelectedTags.push(tag);
            }
            renderTagButtons();
        }

        function drawSong() {
            resultsContainer.innerHTML = ""; // 清空舊畫面
            
            let filteredList = songData.filter(song => {
                if (activeSelectedTags.length === 0) return true;
                return activeSelectedTags.every(neededTag => song.tags && song.tags.includes(neededTag));
            });

            if (filteredList.length === 0) {
                alert("😭 糟糕！這款配方的珍奶目前沒有符合的歌曲，改一下標籤試試看吧！");
                return;
            }

            const desiredCount = parseInt(countSelect.value, 10);
            
            drawBtn.disabled = true;
            loadingStatus.classList.remove("hidden");

            setTimeout(() => {
                let pool = [...filteredList];
                let chosenSongs = [];

                for (let i = 0; i < desiredCount; i++) {
                    if (pool.length === 0) break; 
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    chosenSongs.push(pool[randomIndex]);
                    // 如果不希望同一次連抽時選到重複歌曲，可以把下面這行的註解刪掉：
                    // pool.splice(randomIndex, 1);
                }

                // 渲染抽出來的所有歌曲卡片
                resultsContainer.innerHTML = chosenSongs.map((luckySong, idx) => {
                    const originalIndex = songData.findIndex(s => s.id === luckySong.id || (s.title === luckySong.title && s.artist === luckySong.artist));
                    const displayCode = formatNumber(originalIndex + 1);

                    const tagsHtml = luckySong.tags ? luckySong.tags.map(t => {
                        const isSugar = sugarOrder.includes(t);
                        return `<span class="text-[10px] px-2 py-0.5 rounded-full ${isSugar ? 'bg-[#F5E1D3] text-[#73604E]' : 'bg-[#E6D5C3] text-[#5C4033]'} font-bold border border-black/5">${t}</span>`;
                    }).join('') : '';

                    // 🔮 ✨ 核心修改處：每次迭代卡片時，隨機抓取一句語錄
                    const randomQuoteIndex = Math.floor(Math.random() * quotes.length);
                    const defaultQuote = quotes[randomQuoteIndex];

                    return `
                        <div class="bg-gradient-to-br from-[#FAF0E6] to-[#FFF8DC] border-2 border-[#CD853F] rounded-2xl p-5 shadow-sm text-center transition-all duration-300">
                            <div class="flex justify-between items-center mb-2">
                                <span class="bg-[#D2B48C] text-[#5C4033] text-[10px] font-mono font-bold px-2 py-0.5 rounded-full">${displayCode}</span>
                                <span class="text-[11px] text-[#8C7863] font-medium">🧋 特調第 ${idx + 1} 杯</span>
                            </div>
                            <h2 class="text-xl font-bold text-[#362517] mb-0.5">${luckySong.title}</h2>
                            <p class="text-sm text-[#73604E] mb-2">${luckySong.artist}</p>
                            <div class="flex justify-center flex-wrap gap-1 mb-2">${tagsHtml}</div>
                            <!-- 💡 這裡會動態套用隨機挑選出來的金句喔！ -->
                            <p class="text-xs text-[#A08870] italic border-t border-[#E6D5C3]/60 pt-2">${luckySong.note ? `💡 備註：${luckySong.note}` : `${defaultQuote}`}</p>
                        </div>
                    `;
                }).join('');

                loadingStatus.classList.add("hidden");
                drawBtn.disabled = false;
            }, 1000); 
        }

        loadSongData();
    </script>
</body>
</html>
