<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 隨機點歌</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 min-h-screen p-5 md:p-10 font-sans">

    <div class="max-w-3xl mx-auto text-center mb-8">
        <h1 class="text-3xl font-bold text-sky-600 mb-2"> 隨機點歌</h1>
        <p class="text-gray-600 text-sm">今天想聽點什麼？設定好條件，讓命運幫你決定歌單！</p>
    </div>

    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-6 mb-6">
        <h2 class="text-lg font-bold text-sky-800 mb-4 flex items-center gap-2">
            ⚙️ 抽籤條件設定
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">1. 想要抽出幾首歌？</label>
                <div class="flex items-center gap-3">
                    <input 
                        type="number" 
                        id="drawCountInput" 
                        value="1" 
                        min="1" 
                        max="50" 
                        class="w-24 border-2 border-sky-200 rounded-lg px-3 py-1.5 text-center font-bold text-sky-600 text-lg focus:outline-none focus:border-sky-500"
                    >
                    <span class="text-gray-600 font-medium">首歌曲</span>
                </div>
                <p class="text-xs text-gray-400 mt-1">預設為 1 首，最高可連續抽 50 首。</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">2. 限定歌曲分類（標籤）嗎？</label>
                <select 
                    id="tagSelect" 
                    class="w-full border-2 border-sky-200 rounded-lg px-3 py-2 text-gray-700 focus:outline-none focus:border-sky-500 font-medium"
                >
                    <option value="全部">不限分類（從全部歌單隨機抽）</option>
                    </select>
                <p class="text-xs text-gray-400 mt-1">選定分類後，只會從該分類中隨機挑選。</p>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button 
                onclick="drawSongs()" 
                id="drawBtn" 
                disabled
                class="bg-sky-500 hover:bg-sky-600 disabled:bg-gray-300 text-white font-bold text-lg px-10 py-3 rounded-xl shadow-lg transition-all duration-200 transform hover:scale-105 active:scale-95"
            >
                🚀 測試好運，開始抽歌！
            </button>
        </div>
    </div>

    <div id="resultSection" class="max-w-3xl mx-auto bg-gradient-to-br from-sky-400 to-indigo-500 rounded-2xl shadow-xl p-6 text-white hidden">
        <h2 class="text-xl font-bold mb-4 flex justify-between items-center border-b border-white/20 pb-2">
            <span>🎉 本次幸運生成的歌單</span>
            <span id="resultCountBadge" class="text-xs bg-white text-sky-600 px-2.5 py-1 rounded-full font-bold"></span>
        </h2>
        
        <div id="resultList" class="space-y-3">
            </div>
    </div>

    <script>
        let songData = [];

        const tagSelect = document.getElementById("tagSelect");
        const drawCountInput = document.getElementById("drawCountInput");
        const resultSection = document.getElementById("resultSection");
        const resultList = document.getElementById("resultList");
        const resultCountBadge = document.getElementById("resultCountBadge");
        const drawBtn = document.getElementById("drawBtn");

        function formatNumber(num) { return `#${String(num).padStart(3, '0')}`; }

        // 🚀 自動跟隔壁的 song-data.json 檔案讀取歌單
        async function loadSongData() {
            try {
                const response = await fetch('song-data.json');
                if (!response.ok) throw new Error('找不到 json 檔案');
                songData = await response.json();
                
                // 成功讀取後啟用按鈕並初始化分類選單
                drawBtn.disabled = false;
                initTagSelect();
            } catch (error) {
                console.error(error);
                alert("❌ 讀取歌單失敗！請確保資料夾中含有 'song-data.json'。");
            }
        }

        // 把歌單裡所有的標籤抓出來塞進下拉選單
        function initTagSelect() {
            const allTags = [];
            songData.forEach(song => {
                if(song.tags) {
                    song.tags.forEach(tag => { if(tag && !allTags.includes(tag)) allTags.push(tag); });
                }
            });
            
            allTags.forEach(tag => {
                const option = document.createElement("option");
                option.value = tag;
                option.innerText = `限定：【${tag}】`;
                tagSelect.appendChild(option);
            });
        }

        // 🔥 核心功能：隨機抽歌邏輯
        function drawSongs() {
            const count = parseInt(drawCountInput.value) || 1;
            const selectedTag = tagSelect.value;

            if (count < 1) { alert("請輸入至少要抽 1 首歌曲！"); return; }

            // Step 1: 先根據「分類」過濾出候選歌曲池
            let pool = songData.map((song, index) => ({ ...song, displayCode: formatNumber(index + 1) }));
            if (selectedTag !== "全部") {
                pool = pool.filter(song => song.tags && song.tags.includes(selectedTag));
            }

            if (pool.length === 0) {
                alert(`😭 糟了！分類【${selectedTag}】裡面沒有任何歌曲，無法抽取。`);
                return;
            }

            // 如果想要抽的數量大於歌曲池總數，就調整為歌曲池上限
            const finalCount = Math.min(count, pool.length);
            if (count > pool.length) {
                alert(`提示：目前分類中只有 ${pool.length} 首歌，系統將為你抽出全部歌曲！`);
                drawCountInput.value = pool.length;
            }

            // Step 2: 洗牌演算法（Fisher-Yates Shuffle）隨機打亂歌曲池
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // Step 3: 切出前幾首作為中獎歌曲
            const winners = pool.slice(0, finalCount);

            // Step 4: 把結果渲染到畫面上
            renderResults(winners);
        }

        // 渲染結果畫面
        function renderResults(winners) {
            resultCountBadge.innerText = `共抽出 ${winners.length} 首`;
            
            resultList.innerHTML = winners.map((song, i) => `
                <div class="flex items-center justify-between bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 transform animate-fade-in-up">
                    <div class="flex items-center gap-4">
                        <span class="bg-white text-indigo-600 font-mono font-bold text-sm w-8 h-8 rounded-full flex items-center justify-center shadow">
                            ${i + 1}
                        </span>
                        <div>
                            <div class="font-bold text-lg text-white drop-shadow">${song.title}</div>
                            <div class="text-xs text-sky-100 mt-0.5">原歌單編號：${song.displayCode} | 歌手：${song.artist}</div>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 justify-end max-w-[200px]">
                        ${song.tags ? song.tags.map(t => `<span class="bg-indigo-700/50 text-sky-200 text-[10px] px-2 py-0.5 rounded">${t}</span>`).join('') : ''}
                    </div>
                </div>
            `).join('');

            // 打開隱藏的結果區塊
            resultSection.classList.remove("hidden");
            
            // 貼心自動捲動到結果區給你看
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        // 頁面啟動讀取
        loadSongData();
    </script>
</body>
</html>
